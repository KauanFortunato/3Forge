name: Deploy 3Forge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux, 3forge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy files
        run: |
          mkdir -p /home/umbrel/umbrel/app-data/3forge
          rm -rf /home/umbrel/umbrel/app-data/3forge/dist
          cp -r dist /home/umbrel/umbrel/app-data/3forge/dist
          cp nginx.conf /home/umbrel/umbrel/app-data/3forge/nginx.conf
          cp docker-compose.yml /home/umbrel/umbrel/app-data/3forge/docker-compose.yml

      - name: Restart container
        run: |
          cd /home/umbrel/umbrel/app-data/3forge
          # docker compose up -d
          docker compose restart