name: Deploy 3Forge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux, 3forge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy files
        run: |
          APP_DIR="/mnt/storage/apps/3forge"
      
          mkdir -p "$APP_DIR/config"
          rm -rf "$APP_DIR/dist"
      
          cp -r dist "$APP_DIR/dist"
          cp nginx.conf "$APP_DIR/config/default.conf"
      
      - name: Restart container
        run: |
          CONTAINER="$(docker ps --format '{{.Names}}' | grep -E 'threeforge' | head -n 1)"
      
          if [ -z "$CONTAINER" ]; then
            echo "Container threeforge não encontrado"
            docker ps
            exit 1
          fi
      
          echo "Reiniciando container: $CONTAINER"
          docker restart "$CONTAINER"
