<svg width="520" height="498" viewBox="-100 -100 760 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>3Forge App Splash Intro - Absolute Flawless Mask Overlay</title>
  
  <style>
    /* Configuracoes globais */
    svg { shape-rendering: geometricPrecision; text-rendering: geometricPrecision; }

    /* --- GIZMO: EXPLOSAO INICIAL --- */
    .cube { transform-box: fill-box; transform-origin: center; opacity: 0; animation-fill-mode: forwards; }
    .cube.center { animation: popCenter .4s cubic-bezier(0.34, 1.56, 0.64, 1) 0s forwards; }
    .cube.top    { animation: explodeTop .3s cubic-bezier(0.34, 1.56, 0.64, 1) .05s forwards; }
    .cube.left   { animation: explodeLeft .3s cubic-bezier(0.34, 1.56, 0.64, 1) .10s forwards; }
    .cube.right  { animation: explodeRight .3s cubic-bezier(0.34, 1.56, 0.64, 1) .15s forwards; }

    .rod { transform-box: fill-box; animation-fill-mode: forwards; }
    .rod.v { transform-origin: 50% 100%; transform: scaleY(0); animation: growVertical .2s cubic-bezier(0.34, 1.56, 0.64, 1) .05s forwards; }
    .rod.l { transform-origin: 100% 0%; transform: scaleX(0); animation: growLeft .2s cubic-bezier(0.34, 1.56, 0.64, 1) .10s forwards; }
    .rod.r { transform-origin: 0% 0%; transform: scaleX(0); animation: growRight .2s cubic-bezier(0.34, 1.56, 0.64, 1) .15s forwards; }

    /* --- RIBBONS: REVELACAO SIMULTANEA --- */
    #logoAll { transform-box: fill-box; transform-origin: center; animation: logoSettle 0.8s ease-out 1.0s forwards; }
    
    /* --- SHADING: BRILHO COORDENADO --- */
    .shine { opacity: 0; mix-blend-mode: screen; animation-fill-mode: forwards; }
    .s1, .s2, .s3, .s4, .s5, .s6, .s1o { 
      animation: shineIn .2s ease-out 0.6s forwards, shineOut .2s ease-in 0.8s forwards; 
    }

    /* --- WORDMARK FINAL: LOGO ARRASTA PARA A ESQUERDA E REVELA 3FORGE --- */
    #brandMark {
      transform-box: view-box;
      transform-origin: 240px 260px;
      animation: markSlideLeft 0.85s cubic-bezier(0.16, 1, 0.3, 1) 1.65s forwards;
    }

    #wordmark {
      opacity: 0;
      animation: wordmarkAppear 0.12s ease-out 1.68s forwards;
    }

    #wordmarkText {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 94px;
      font-weight: 800;
      letter-spacing: -4px;
      dominant-baseline: middle;
      fill: #9258F3;
    }

    @keyframes logoSettle { 0%{transform:translateY(0px);} 30%{transform:translateY(-2px);} 100%{transform:translateY(0px);} }

    @keyframes popCenter { 
        0% { opacity: 0; transform: scale(0) rotate(-45deg); } 
        100% { opacity: 1; transform: scale(1) rotate(0deg); } 
    }
    @keyframes explodeTop { 
        0% { opacity: 0; transform: translateY(30px) scale(0.5); } 
        100% { opacity: 1; transform: translateY(0) scale(1); } 
    }
    @keyframes explodeLeft { 
        0% { opacity: 0; transform: translate(20px, -15px) scale(0.5); } 
        100% { opacity: 1; transform: translate(0, 0) scale(1); } 
    }
    @keyframes explodeRight { 
        0% { opacity: 0; transform: translate(-20px, -15px) scale(0.5); } 
        100% { opacity: 1; transform: translate(0, 0) scale(1); } 
    }
    @keyframes growVertical { 0%{transform:scaleY(0);} 100%{transform:scaleY(1);} }
    @keyframes growLeft { 0%{transform:scaleX(0);} 100%{transform:scaleX(1);} }
    @keyframes growRight { 0%{transform:scaleX(0);} 100%{transform:scaleX(1);} }
    @keyframes shineIn { from{opacity:0;} to{opacity:0.4;} }
    @keyframes shineOut { from{opacity:0.4;} to{opacity:0;} }
    @keyframes markSlideLeft {
      0% { transform: translateX(0px); }
      68% { transform: translateX(-142px); }
      84% { transform: translateX(-126px); }
      100% { transform: translateX(-132px); }
    }

    @keyframes wordmarkAppear {
      from { opacity: 0; }
      to { opacity: 1; }
    }

  </style>

